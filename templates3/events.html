<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <h1>Dogodki za dan {{ day }}. {{ month }}</h1>
    {% if dogodki %}
        <ul>
        {% for dogodek in dogodki %}
            <li>{{ dogodek.year }}: {{ dogodek.description }}
            {% if dogodek.wikipedia %}
                <a href="{{ dogodek.wikipedia }}" target="_blank">[Wikipedia]</a>
            {% endif %}
            </li><br>
        {% endfor %}
        </ul>
    {% else %}
        <p>Ni dogodkov za ta dan.</p>
    {% endif %}
</body>
</html>
