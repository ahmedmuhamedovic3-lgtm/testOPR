<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    <h2>Note dashboard</h2>
    Pozdravljen {{ uporabnik }}
    <br>
    <textarea oninput="saveNote()" id="note" cols="30" rows="10">{{ note }}</textarea>
    <button onclick="saveNote()" type="button">SHRANI</button>
    <br>
    <a href="/logout">ODJAVI SE</a>

</body>

</html>

<script>
    function saveNote() {
        var noteText = document.getElementById("note").value
        $.ajax({
            url: "/saveNote",
            method: "POST",
            data: {
                note: noteText
            },
            success: function (result) {
                $("#weather-temp").html("<strong>" + result + "</strong> degrees");
            }
        });
    }

</script>
