<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
        integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    <h2>Note dashboard</h2>
    Pozdravljen {{ uporabnik }}</span>
    <br>
    <form action="/dashboard" method="post">
        <input id="title" name="title" value="{{ note.title | default('') }}">
        <br>
        <textarea oninput="saveNote()" id="note" cols="30" rows="10">{{ note.content | default('') }}</textarea>
        <br>
        <a href="/dashboard">
            <button onclick="saveNoteAndRedirect()" type="button">SHRANI</button><br>
            <button onclick="back()" type="button">NAZAJ</button><br>
            <button onclick="deleteNote()" type="button">IZBRIŠI</button>
        </a>
    </form>
    <br>
    <a href="/logout">ODJAVI SE</a>

</body>

</html>

<script>
    const id = "{{ id }}";
    const targetUser = "{{ target_user or '' }}";
    function saveNote() {
        var noteText = document.getElementById("note").value
        var title = document.getElementById("title").value
        $.ajax({
            url: "/saveNote",
            method: "POST",
            data: {
                content: noteText,
                id: id,
                title: title,
                user: targetUser
            },
            success: function (result) {
                // Auto-save: no redirect, just silent save
            }
        });
    }
    function saveNoteAndRedirect() {
        var noteText = document.getElementById("note").value
        var title = document.getElementById("title").value
        $.ajax({
            url: "/saveNote",
            method: "POST",
            data: {
                content: noteText,
                id: id,
                title: title,
                user: targetUser
            },
            success: function (result) {
                // Redirect based on whether this is admin viewing another user's notes
                if (targetUser) {
                    window.location.href = "/admin/user/" + targetUser;
                } else {
                    window.location.href = "/dashboard";
                }
            }
        });
    }
    function back() {
        // Redirect based on whether this is admin viewing another user's notes
        if (targetUser) {
            window.location.href = "/admin/user/" + targetUser;
        } else {
            window.location.href = "/dashboard";
        }
    }
    function deleteNote() {
        $.ajax({
            url: "/deleteNote",
            method: "POST",
            data: {
                id: id,
                user: targetUser
            },
            success: function (result) {
                // Redirect based on whether this is admin viewing another user's notes
                if (targetUser) {
                    window.location.href = "/admin/user/" + targetUser;
                } else {
                    window.location.href = "/dashboard";
                }
            }
        });
    }
</script>
