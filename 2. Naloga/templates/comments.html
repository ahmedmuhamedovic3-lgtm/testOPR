<!DOCTYPE html>
<html lang="en">
<head>
    <title>Komentarji</title>
</head>
<body>
    <h1>Komentarji</h1>
    {% if comments %}
        {% for comment in comments %}
            <p><strong>{{ comment.username }}</strong></p>
            <p style="white-space: pre-wrap;">{{ comment.content }}</p>
        {% endfor %}
    {% else %}
        <p>Še ni komentarjev.</p>
    {% endif %}
    <a href="/dashboard">NAZAJ</a><br>
    <a href="/logout">ODJAVI SE</a>
</body>
</html>
