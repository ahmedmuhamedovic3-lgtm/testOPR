<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
</head>
<body>
    <h1>Note dashboard</h1>
    Pozdravljen {{ uporabnik }} {{ posts }}
    <br>
    <a href="/profile">Tvoj profil</a>
    <br>
    <h2>Objave:</h2>
    {% if posts %}
        {% for post in posts %}
            <p><strong>{{ post.username }}</strong></p>
            <p style="white-space: pre-wrap;">{{ post.content[:50] }}{% if post.content|length > 50 %}...{% endif %}</p>
            <a href="javascript:void(0)" onclick="like('{{ post.id }}')">👍</a>
            <a href="javascript:void(0)" onclick="dislike('{{ post.id }}')">👎</a>
            <a href="javascript:void(0)" onclick="comment('{{ post.id }}')">💬</a>
        {% endfor %}
        <br><br><br>
    {% else %}
        <p>Še ni objav.</p>
    {% endif %}
    <a href="/logout">ODJAVI SE</a>
</body>
</html>

<script>
    function like(id) {
        $.ajax({
            url: "/like",
            method: "POST",
            data: {
                id: id
            },
            success: function (result) {
                // Handle like response if needed
            }
        });
    }
    function dislike(id) {
        $.ajax({
            url: "/dislike",
            method: "POST",
            data: {
                id: id
            },
            success: function (result) {
                // Handle dislike response if needed
            }
        });
    }
    function comment(id) {
        $.ajax({
            url: "/comment",
            method: "POST",
            data: {
                id: id
            },
            success: function (result) {
                // Handle comment response if needed
            }
        });
    }
</script>
